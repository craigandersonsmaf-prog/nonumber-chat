<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#075E54" />
  <title>NoNumber Live Chat</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="icon" href="assets/icon-192.png" />
  <link rel="stylesheet" href="styles.css?v=hotfix2" />
</head>
<body>
  <div id="app">
    <div class="loading">
      <div class="logo">NN</div>
      <p>Loading NoNumber Chat…</p>
    </div>
  </div>

  <script>
    // Hotfix: remove any older service worker/caches from previous builds.
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then(regs => regs.forEach(reg => reg.unregister()))
        .catch(() => {});
    }
    if ("caches" in window) {
      caches.keys().then(keys => keys.forEach(key => caches.delete(key))).catch(() => {});
    }
  </script>
  <script type="module" src="app.js?v=hotfix2"></script>
</body>
</html>
